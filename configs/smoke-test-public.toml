# ─── Internal Metrics ────────────────────────────────────────────────
[[inputs.internal]]
  interval = "30s"

# ─── Outputs ─────────────────────────────────────────────────────────

# Local store — write everything to disk for inspection
[outputs.local_store]
  enabled = true
  path = "./data/smoke-test"
  retention_days = 7
  rotation = "daily"

# Also write to a JSONL file for easy inspection
[[outputs.file]]
  alias = "debug_log"
  path = "./data/smoke-test/metrics.jsonl"
  data_format = "json"

# ─── Web UI ──────────────────────────────────────────────────────────
[webui]
  enabled = true
  port = 8080
  bind = "127.0.0.1"
