# CollatrEdge Smoke Test — Public Data Sources
# Zero-config: connects to free public servers over the internet
# No authentication required, no local infrastructure needed
#
# Sources:
#   OPC-UA  → Eclipse Milo demo server (dynamic values, multiple types)
#   MQTT    → broker.emqx.io (public broker, JSON sensor topics)
#   MQTT    → test.mosquitto.org (general traffic)
#
# NOTE: No HTTP input plugin in MVP. Sparkplug B parsing not yet implemented.
# NOTE: Network policy defaults to "connected" (unrestricted egress).

[agent]
  hostname = "smoke-test"
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  precision = "1ms"
  log_level = "info"

[global_tags]
  environment = "smoke-test"
  source = "public"

# ─── OPC-UA: Eclipse Milo Demo Server ────────────────────────────────
# Dynamic values that change on their own. Multiple data types.
# Server info: https://github.com/digitalpetri/opc-ua-demo-server
[[inputs.opcua]]
  alias = "milo_demo"
  endpoint = "opc.tcp://milo.digitalpetri.com:62541/milo"
  security_policy = "None"
  security_mode = "None"
  auth_method = "anonymous"
  connect_timeout = "15s"
  request_timeout = "10s"
  timestamp = "source"

  [inputs.opcua.subscription]
    publishing_interval = "2s"
    queue_size = 10

  # Dynamic nodes — these change value automatically
  [[inputs.opcua.nodes]]
    node_id = "ns=2;s=Dynamic/RandomInt32"
    name = "random_int32"
  [[inputs.opcua.nodes]]
    node_id = "ns=2;s=Dynamic/RandomInt64"
    name = "random_int64"
  [[inputs.opcua.nodes]]
    node_id = "ns=2;s=Dynamic/RandomFloat"
    name = "random_float"
  [[inputs.opcua.nodes]]
    node_id = "ns=2;s=Dynamic/RandomDouble"
    name = "random_double"

  # Use browse to discover what else is available
  [inputs.opcua.browse]
    enabled = false
    root_node_id = "ns=2;s=Dynamic"
    max_depth = 3
    output_file = "milo-browse-output.toml"

# ─── MQTT: EMQX Public Broker ────────────────────────────────────────
# More stable than mosquitto. People publish all sorts here.
# We subscribe to a few common patterns where IoT devices post data.
#
# NOTE: Public MQTT brokers carry heterogeneous payloads from many devices.
# Wildcard subscriptions will receive JSON, plain text, NMEA GPS sentences,
# binary data, etc. Use data_format = "auto" for best results.
# Parse errors from non-JSON payloads are throttled (first 5 verbose,
# then periodic summaries every 60s).
